{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-prometheus-config
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.monitoring.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.monitoring.prometheus.scrapeInterval }}

    scrape_configs:
      - job_name: llm-gpu-benchmarking-control-plane
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "llm-gpu-benchmarking.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}

      - job_name: llm-gpu-benchmarking-worker
        metrics_path: /
        static_configs:
          - targets:
              - {{ include "llm-gpu-benchmarking.fullname" . }}-worker.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.worker.service.port }}

      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-grafana-datasources
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  prometheus.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://{{ include "llm-gpu-benchmarking.fullname" . }}-prometheus.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.monitoring.prometheus.service.port }}
        isDefault: true
        editable: true
        jsonData:
          timeInterval: {{ .Values.monitoring.prometheus.scrapeInterval }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-grafana-dashboard-provider
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: LLM GPU Benchmarking
        orgId: 1
        folder: LLM GPU Benchmarking
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioned-dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-grafana-dashboards
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  dashboard.json: |
{{ .Files.Get "dashboards/dashboard.json" | indent 4 }}
{{- end }}
