{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gpu-benchmarking.secretName" . }}
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
type: Opaque
stringData:
  NVIDIA_API_KEY: {{ required "secret.nvidiaApiKey is required when secret.create=true" .Values.secret.nvidiaApiKey | quote }}
{{- end }}
