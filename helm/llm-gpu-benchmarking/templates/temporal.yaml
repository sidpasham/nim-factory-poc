{{- if .Values.temporal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-temporal
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: {{ .Values.temporal.servicePort }}
      targetPort: grpc
      protocol: TCP
    - name: ui
      port: {{ .Values.temporal.uiPort }}
      targetPort: ui
      protocol: TCP
  selector:
    {{- include "llm-gpu-benchmarking.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-temporal
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "llm-gpu-benchmarking.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: temporal
  template:
    metadata:
      labels:
        {{- include "llm-gpu-benchmarking.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: temporal
    spec:
      containers:
        - name: temporal
          image: {{ .Values.temporal.image | quote }}
          imagePullPolicy: IfNotPresent
          command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0"]
          ports:
            - name: grpc
              containerPort: {{ .Values.temporal.servicePort }}
              protocol: TCP
            - name: ui
              containerPort: {{ .Values.temporal.uiPort }}
              protocol: TCP
{{- end }}
