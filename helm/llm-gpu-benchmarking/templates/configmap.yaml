apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-config
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
data:
  LLM_GPU_BENCHMARKING_MINIMUM_TPS_THRESHOLD: {{ .Values.config.minimumTpsThreshold | quote }}
  NIM_BASE_URL: {{ .Values.config.nimBaseUrl | quote }}
  NIM_TIMEOUT_SECONDS: {{ .Values.config.nimTimeoutSeconds | quote }}
  LLM_GPU_BENCHMARKING_VALIDATION_MODE: {{ .Values.config.validationMode | quote }}
  TEMPORAL_ADDRESS: {{ default (printf "%s-temporal:7233" (include "llm-gpu-benchmarking.fullname" .)) .Values.config.temporalAddress | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
