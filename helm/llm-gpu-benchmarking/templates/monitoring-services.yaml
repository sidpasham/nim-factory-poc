{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-prometheus
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: {{ .Values.monitoring.prometheus.service.type }}
  ports:
    - port: {{ .Values.monitoring.prometheus.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-gpu-benchmarking.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-gpu-benchmarking.fullname" . }}-grafana
  labels:
    {{- include "llm-gpu-benchmarking.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.monitoring.grafana.service.type }}
  ports:
    - port: {{ .Values.monitoring.grafana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-gpu-benchmarking.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
{{- end }}
