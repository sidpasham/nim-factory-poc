replicaCount: 1

image:
  repository: llm-gpu-benchmarking-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llm-gpu-benchmarking.localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  minimumTpsThreshold: "100"
  nimBaseUrl: "https://integrate.api.nvidia.com/v1"
  nimTimeoutSeconds: "30"
  validationMode: "local"
  localLlmRoot: ".runtime/local-llm"
  localLlmProfilesPath: "src/config/local_llm_profiles.json"
  llamaCppRepoUrl: "https://github.com/ggml-org/llama.cpp.git"
  llamaCppGitRef: "master"
  llamaCppCmakeArgs: "-DGGML_METAL=OFF -DBUILD_SHARED_LIBS=OFF"
  llamaCppBuildJobs: "2"
  llamaCppThreads: "2"
  llamaCppBenchRepetitions: "1"
  localLlmDownloadTimeoutSeconds: "1800"
  localLlmBenchmarkTimeoutSeconds: "900"
  localLlmWarmupOnStartup: "true"
  localLlmWarmupModels: "all"
  localLlmWarmupPrecisionModes: "INT4"
  localLlmWarmupRequired: "true"
  temporalAddress: ""
  logLevel: "INFO"

temporal:
  enabled: true
  image: temporalio/admin-tools:1.30
  servicePort: 7233
  uiPort: 8233

worker:
  replicaCount: 1
  metricsPort: 9000
  maxConcurrentActivities: "1"
  service:
    type: ClusterIP
    port: 9000

monitoring:
  enabled: false
  prometheus:
    image: prom/prometheus:latest
    imagePullPolicy: IfNotPresent
    retention: 24h
    scrapeInterval: 5s
    service:
      type: ClusterIP
      port: 9090
    ingress:
      enabled: false
      className: ""
      annotations: {}
      host: prometheus.llm-gpu-benchmarking.localhost
      path: /
      pathType: Prefix
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  grafana:
    image: grafana/grafana:latest
    imagePullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    service:
      type: ClusterIP
      port: 3000
    ingress:
      enabled: false
      className: ""
      annotations: {}
      host: grafana.llm-gpu-benchmarking.localhost
      path: /
      pathType: Prefix
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi

secret:
  create: false
  name: llm-gpu-benchmarking-secrets
  nvidiaApiKey: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8000"

workerPodAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/"
  prometheus.io/port: "9000"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "4"
    memory: 8Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
