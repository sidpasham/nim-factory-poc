apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "model-factory.fullname" . }}-worker
  labels:
    {{- include "model-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "model-factory.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "model-factory.workerSelectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.workerPodAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: model-factory-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["python", "-m", "worker"]
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort }}
              protocol: TCP
          env:
            - name: METRICS_PORT
              value: {{ .Values.worker.metricsPort | quote }}
            - name: MAX_CONCURRENT_ACTIVITIES
              value: {{ .Values.worker.maxConcurrentActivities | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "model-factory.fullname" . }}-config
            - secretRef:
                name: {{ include "model-factory.secretName" . }}
                optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
