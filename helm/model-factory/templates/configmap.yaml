apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "model-factory.fullname" . }}-config
  labels:
    {{- include "model-factory.labels" . | nindent 4 }}
data:
  MODEL_FACTORY_MINIMUM_TPS_THRESHOLD: {{ .Values.config.minimumTpsThreshold | quote }}
  NIM_BASE_URL: {{ .Values.config.nimBaseUrl | quote }}
  NIM_TIMEOUT_SECONDS: {{ .Values.config.nimTimeoutSeconds | quote }}
  MODEL_FACTORY_VALIDATION_MODE: {{ .Values.config.validationMode | quote }}
  TEMPORAL_ADDRESS: {{ default (printf "%s-temporal:7233" (include "model-factory.fullname" .)) .Values.config.temporalAddress | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
