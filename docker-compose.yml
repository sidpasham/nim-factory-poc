name: model-factory-poc

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: model_factory_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_FACTORY_MINIMUM_TPS_THRESHOLD=${MODEL_FACTORY_MINIMUM_TPS_THRESHOLD:-100}
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NIM_TIMEOUT_SECONDS=${NIM_TIMEOUT_SECONDS:-30}
      - MODEL_FACTORY_VALIDATION_MODE=${MODEL_FACTORY_VALIDATION_MODE:-validation}
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CONNECT_ATTEMPTS=20
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - model_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      - temporal

  temporal:
    image: temporalio/admin-tools:1.30
    container_name: model_factory_temporal
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    command: [ "temporal", "server", "start-dev", "--ip", "0.0.0.0" ]
    ports:
      - "7233:7233"   # Temporal gRPC Server
      - "8233:8233"   # Temporal Web UI Dashboard
    networks:
      - model_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: model_factory_worker
    command: python -m worker
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CONNECT_ATTEMPTS=20
      - METRICS_PORT=9000
      - MAX_CONCURRENT_ACTIVITIES=${MAX_CONCURRENT_ACTIVITIES:-10}
      - MODEL_FACTORY_MINIMUM_TPS_THRESHOLD=${MODEL_FACTORY_MINIMUM_TPS_THRESHOLD:-100}
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NIM_TIMEOUT_SECONDS=${NIM_TIMEOUT_SECONDS:-30}
      - MODEL_FACTORY_VALIDATION_MODE=${MODEL_FACTORY_VALIDATION_MODE:-validation}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    expose:
      - "9000"
    networks:
      - model_network
    depends_on:
      - temporal

  prometheus:
    image: prom/prometheus:latest
    container_name: model_factory_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - model_network
    depends_on:
      app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: model_factory_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - model_network
    depends_on:
      - prometheus

networks:
  model_network:
    driver: bridge
