global:
  scrape_interval: 5s # High-frequency scraping for local real-time demo

scrape_configs:
  - job_name: "model-factory-control-plane"
    static_configs:
      - targets: ["app:8000"] # Points to the app service inside Docker network
  - job_name: "model-factory-worker"
    metrics_path: "/"
    static_configs:
      - targets: ["worker:9000"]
